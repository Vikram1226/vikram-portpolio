<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --accent: #c8ff00;
      --white: #f5f5f0;
      --gray: #555;
      --light-gray: #999;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      padding: 40px;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 40px; padding-bottom: 20px;
      border-bottom: 1px solid var(--surface2);
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 48px;
      letter-spacing: 2px; color: var(--accent);
    }
    .stats {
      font-family: 'DM Mono', monospace; font-size: 14px; color: var(--light-gray);
    }
    .messages-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
    }
    .message-card {
      background: var(--surface);
      border: 1px solid var(--surface2);
      padding: 24px;
      border-top: 3px solid var(--surface2);
      transition: all 0.3s;
    }
    .message-card:hover {
      border-top-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .msg-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 16px;
    }
    .msg-name {
      font-size: 20px; font-weight: 700; color: var(--white);
      margin-bottom: 4px;
    }
    .msg-email {
      font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent);
    }
    .msg-date {
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gray);
    }
    .msg-body {
      font-size: 14px; color: var(--light-gray); line-height: 1.6;
      background: #0a0a0a; padding: 16px; border: 1px solid rgba(255,255,255,0.05);
      white-space: pre-wrap;
    }
    .loading {
      text-align: center; font-family: 'DM Mono', monospace; color: var(--accent);
      padding: 40px; font-size: 16px; letter-spacing: 2px;
    }
    
    /* Login Overlay */
    #loginOverlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; flex-direction: column; gap: 20px;
    }
    .login-box {
      background: var(--surface); padding: 40px; border: 1px solid var(--surface2);
      width: 100%; max-width: 400px; text-align: center;
    }
    .login-box h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; margin-bottom: 24px; }
    .form-input {
      width: 100%; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1);
      padding: 16px; color: var(--white); margin-bottom: 16px;
      font-family: 'Space Grotesk', sans-serif; outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; background: var(--accent); color: #000; padding: 16px;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      border: none; cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
    }
    .error-msg { color: #ff3366; font-size: 12px; margin-top: 10px; display: none; }
  </style>
</head>
<body>

  <!-- Simple Password Protection -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2>ADMIN LOGIN</h2>
      <input type="password" id="passInput" class="form-input" placeholder="Enter Password">
      <button class="btn" onclick="checkPassword()">Access Panel</button>
      <div id="loginError" class="error-msg">Incorrect Password</div>
    </div>
  </div>

  <div class="header">
    <h1>ADMIN PANEL</h1>
    <div class="stats">Total Messages: <span id="totalCount" style="color:var(--accent)">0</span></div>
  </div>

  <div id="messagesGrid" class="messages-grid">
    <div class="loading">LOADING MESSAGES...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Simple password to prevent public viewing (Password: admin123)
    function checkPassword() {
      try {
        if (document.getElementById('passInput').value === 'admin123') {
          document.getElementById('loginOverlay').style.display = 'none';
          fetchMessages();
        } else {
          document.getElementById('loginError').style.display = 'block';
        }
      } catch (err) {
        alert("Error checking password: " + err.message);
      }
    }

    // Allow pressing "Enter" to submit password
    document.getElementById('passInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        checkPassword();
      }
    });

    async function fetchMessages() {
      const grid = document.getElementById('messagesGrid');
      grid.innerHTML = '<div class="loading">LOADING MESSAGES...</div>';
      
      try {
        if (!window.supabase) {
           throw new Error("Supabase library not loaded. Please check your internet connection.");
        }

        const supabaseUrl = 'https://hjvwvizamhsnuazxrmlc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhqdnd2aXphbWhzbnVhenhybWxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1MTczMjcsImV4cCI6MjEwMDA5MzMyN30.4sCsXxhvmDDpEw5PvsgOl4Fz_NtOB4lUAv9m9aClRmk';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        const { data, error } = await supabase
          .from('contact_messages')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          throw error;
        }

        document.getElementById('totalCount').textContent = data.length;

        if (data.length === 0) {
          grid.innerHTML = `<div class="loading">No messages yet.</div>`;
          return;
        }

        grid.innerHTML = '';
        data.forEach(msg => {
          const date = new Date(msg.created_at).toLocaleString();
          const card = document.createElement('div');
          card.className = 'message-card';
          card.innerHTML = `
            <div class="msg-header">
              <div>
                <div class="msg-name">${escapeHTML(msg.user_name)}</div>
                <a href="mailto:${escapeHTML(msg.user_email)}" class="msg-email">${escapeHTML(msg.user_email)}</a>
              </div>
              <div class="msg-date">${date}</div>
            </div>
            <div class="msg-body">${escapeHTML(msg.message)}</div>
          `;
          grid.appendChild(card);
        });
      } catch (error) {
        grid.innerHTML = `<div class="loading" style="color:#ff3366">Error: ${error.message}</div>`;
        console.error("Fetch Messages Error:", error);
      }
    }

    function escapeHTML(str) {
      if (!str) return '';
      return String(str).replace(/[&<>'"]/g, 
        tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
          }[tag] || tag)
      );
    }
  </script>
</body>
</html>
